<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartSwitch Pro</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h2 {
      text-align: center;
      font-weight: 300;
      margin-bottom: 20px;
    }

    .btn {
      background: linear-gradient(to right, #3a7bd5, #00d2ff);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      margin: 8px 0;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-alt {
      background: linear-gradient(to right, #e94560, #ff6b81);
    }

    .box {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    input, select {
      padding: 6px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    input[type="number"] {
      width: 70px;
      text-align: center;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .day-btn {
      display: inline-block;
      width: 30px;
      height: 30px;
      line-height: 30px;
      text-align: center;
      background: #333;
      border-radius: 50%;
      margin: 2px;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
    }

    .day-btn.active {
      background: #ff6b81;
      font-weight: bold;
    }

    #message {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
    }

    /*
    .footer {
      margin-top: 15px;
      font-size: 0.75em;
      opacity: 0.7;
      text-align: center;
    }
      */
    .footer {
    margin-top: 30px;
    padding: 20px;
    text-align: center;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.7);
    width: 100%;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    letter-spacing: 0.5px;
    line-height: 1.6;
}

  .footer b {
      color: #00d2ff; /* accent blue for the corp name */
      font-size: 15px;
      text-transform: uppercase;
  }
  </style>
</head>

<body>
  <div class="card">
    <h2>Smart Switch</h2>

    <!-- Manual Toggle -->
    <button class="btn" onclick="fetch('/toggle')">
      POWER ON / OFF
    </button>

    <!-- Clock Sync -->
    <div class="box" style="text-align:center;">
      <label style="font-size:13px;color:#ccc;">Device Time</label><br>
      <input type="time" id="curTime">
      <button class="btn btn-alt" style="padding:6px;font-size:13px;" onclick="syncClock()">
        Sync to Phone
      </button>
    </div>

    <!-- Scheduler -->
    <div class="box">
      <div style="font-weight:bold;text-align:center;margin-bottom:10px;">
        Automation
      </div>

      <div class="row">
        <span>Action:</span>
        <select id="schAction">
          <option value="1">ON</option>
          <option value="0">OFF</option>
        </select>
      </div>

      <div class="row">
        <span>At Time:</span>
        <input type="time" id="schTime">
      </div>

      <div class="row">
        <span>Duration:</span>
        <div>
          <input type="number" id="schDur"> mins
        </div>
      </div>

      <div style="font-size:11px;color:#ccc;text-align:right;">
        (0 = stay)
      </div>

      <div style="margin-top:10px;">Repeat On:</div>

      <div style="text-align:center;">
        <span class="day-btn" data-v="1">S</span>
        <span class="day-btn" data-v="2">M</span>
        <span class="day-btn" data-v="4">T</span>
        <span class="day-btn" data-v="8">W</span>
        <span class="day-btn" data-v="16">T</span>
        <span class="day-btn" data-v="32">F</span>
        <span class="day-btn" data-v="64">S</span>
      </div>

      <button class="btn btn-alt" onclick="setSched()">
        Save Schedule
      </button>
    </div>

    <!-- OTA Section -->
    <div class="box">
      <div style="font-weight:bold;text-align:center;margin-bottom:10px;">
        OTA Update
      </div>

      <input type="file" id="fwfile" accept=".bin">
      <button class="btn" onclick="uploadFirmware()">
        Update Firmware
      </button>

      <input type="file" id="spiffsfile" accept=".bin">
      <button class="btn" onclick="uploadSPIFFS()">
        Update SPIFFS
      </button>

      <div id="message"></div>
    </div>

    <div class="footer">
      Connected via Local Access Point
    </div>
  </div>

  <!-- wifi section -->
   <div class="box">
  <div style="font-weight:bold;text-align:center;margin-bottom:10px;">
    Wi-Fi Settings
  </div>
  <div class="row">
    <span>SSID:</span>
    <input type="text" id="wifi_ssid" placeholder="Network Name">
  </div>
  <div class="row">
    <span>Pass:</span>
    <input type="password" id="wifi_pass" placeholder="Password">
  </div>
  <button class="btn" onclick="saveWifi()">Connect & Save</button>
  
  <div id="wifi_status" style="margin-top:10px; font-size:12px; text-align:center; color:#00d2ff; word-break: break-all;">
    Status: Not Connected
  </div>
</div>

<div class="footer">
    <b>LnH Corp.</b><br>
    Made with <span style="color: #ff4d4d;">&#10084;</span> by Aftab Lodhi & Mir Hamza
</div>

<script>
  window.onload = function () {
    // 1. Initialize Local Clock Input
    let now = new Date();
    document.getElementById("curTime").value =
      now.getHours().toString().padStart(2, "0") + ":" +
      now.getMinutes().toString().padStart(2, "0");

    // 2. Initialize Day Selection Buttons
    document.querySelectorAll(".day-btn").forEach(btn => {
      btn.onclick = function () {
        this.classList.toggle("active");
      };
    });

    // 3. NEW: Check connection status immediately on page load
    checkCurrentStatus();
  };

  // Dedicated function to update the Wi-Fi card status
  function checkCurrentStatus() {
    let status = document.getElementById("wifi_status");
    fetch('/get_ip')
      .then(res => res.text())
      .then(ip => {
        if (ip !== "0.0.0.0" && ip.trim() !== "") {
          status.innerHTML = `Connected! IP: <b style="color:#00ff00;">${ip}</b>`;
        } else {
          status.innerHTML = "Status: Not Connected";
        }
      })
      .catch(() => {
        status.innerHTML = "Status: Offline (AP Mode)";
      });
  }

  function syncClock() {
    let t = document.getElementById("curTime").value;
    if (!t) return;
    let parts = t.split(":");
    fetch("/set_time?h=" + parts[0] + "&m=" + parts[1])
      .then(() => alert("Clock Synced!"));
  }

  function setSched() {
    let t = document.getElementById("schTime").value;
    if (!t) { alert("Select time!"); return; }
    let action = document.getElementById("schAction").value;
    let dur = document.getElementById("schDur").value || 0;
    let mask = 0;
    document.querySelectorAll(".day-btn.active").forEach(btn => {
      mask |= parseInt(btn.getAttribute("data-v"));
    });
    let parts = t.split(":");
    fetch(`/schedule?h=${parts[0]}&m=${parts[1]}&a=${action}&dur=${dur}&d=${mask}`)
      .then(() => alert("Schedule Saved!"));
  }

  function uploadFirmware() {
    const file = document.getElementById("fwfile").files[0];
    const message = document.getElementById("message");
    if (!file) { message.innerHTML = "Select firmware file."; return; }
    message.innerHTML = "Uploading firmware...";
    fetch("/update", {
      method: "POST",
      headers: { "Content-Type": "application/octet-stream" },
      body: file
    })
    .then(response => response.text())
    .then(data => message.innerHTML = data)
    .catch(() => message.innerHTML = "Upload failed!");
  }

  function uploadSPIFFS() {
    const file = document.getElementById("spiffsfile").files[0];
    const message = document.getElementById("message");
    if (!file) { message.innerHTML = "Select SPIFFS file."; return; }
    message.innerHTML = "Uploading SPIFFS...";
    fetch("/update_spiffs", {
      method: "POST",
      headers: { "Content-Type": "application/octet-stream" },
      body: file
    })
    .then(response => response.text())
    .then(data => message.innerHTML = data)
    .catch(() => message.innerHTML = "SPIFFS upload failed");
  }

  function saveWifi() {
    let ssid = document.getElementById("wifi_ssid").value;
    let pass = document.getElementById("wifi_pass").value;
    let status = document.getElementById("wifi_status");
    if (!ssid) { alert("SSID is required!"); return; }
    status.innerHTML = "Connecting... Please wait.";
    fetch(`/config_wifi?ssid=${encodeURIComponent(ssid)}&pass=${encodeURIComponent(pass)}`)
      .then(response => response.text())
      .then(data => { status.innerHTML = data; })
      .catch(() => { status.innerHTML = "Request failed. Check AP connection."; });
  }

  // Poll for IP address every 5 seconds ONLY if we are waiting for a connection
  setInterval(() => {
    let status = document.getElementById("wifi_status");
    if (status.innerHTML.includes("Connecting") || status.innerHTML.includes("checking status")) {
      checkCurrentStatus();
    }
  }, 5000);
</script>
</body>
</html>
