<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: white; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        margin: 0; 
      }
      .card { 
        background: rgba(255, 255, 255, 0.1); 
        backdrop-filter: blur(10px); 
        padding: 30px; 
        border-radius: 20px; 
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); 
        border: 1px solid rgba(255, 255, 255, 0.18); 
        text-align: center; 
      }
      h1 { margin-bottom: 10px; font-weight: 300; }
      .status { font-size: 0.9em; opacity: 0.8; margin-bottom: 25px; }
      .btn { 
        background: linear-gradient(to right, #3a7bd5, #00d2ff); 
        border: none; 
        color: white; 
        padding: 15px 40px; 
        font-size: 1.2em; 
        border-radius: 50px; 
        cursor: pointer; 
        transition: 0.3s; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
      }
      .btn:active { transform: scale(0.95); }
      .footer { margin-top: 20px; font-size: 0.7em; opacity: 0.5; }
      #message { margin-top: 15px; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>SmartSwitch</h1>
      <p class="status">Device: ESP32-LNH</p>

      <button class="btn" onclick="fetch('/toggle')">
        POWER ON/OFF
      </button>

      <br><br>

      <!-- OTA Upload -->
      <input type="file" id="fwfile" accept=".bin">
      <br><br>
      <button class="btn" onclick="uploadFirmware()">
        Update Firmware
      </button>
      <br><br>
      <input type="file" id="spiffsfile" accept=".bin">
      <br><br>
      <button class="btn" onclick="uploadSPIFFS()">
        Update SPIFFS
      </button>
      <div id="message"></div>

      <div class="footer">Connected via Local Access Point</div>
    </div>

    <script>
      function uploadFirmware() {
        const fileInput = document.getElementById("fwfile");
        const message = document.getElementById("message");

        if (!fileInput.files.length) {
          message.innerHTML = "Please select a firmware file.";
          return;
        }

        const file = fileInput.files[0];

        message.innerHTML = "Uploading firmware...";

        fetch("/update", {
          method: "POST",
          headers: {
            "Content-Type": "application/octet-stream"
          },
          body: file
        })
        .then(response => response.text())
        .then(data => {
          message.innerHTML = data;
        })
        .catch(error => {
          message.innerHTML = "Upload failed!";
        });
      }

      function uploadSPIFFS() {
        const fileInput = document.getElementById("spiffsfile");
        const message = document.getElementById("message");

        if (!fileInput.files.length) {
          message.innerHTML = "Select SPIFFS file.";
          return;
        }

        const file = fileInput.files[0];

        message.innerHTML = "Uploading SPIFFS...";

        fetch("/update_spiffs", {
          method: "POST",
          headers: {
            "Content-Type": "application/octet-stream"
          },
          body: file
        })
        .then(response => response.text())
        .then(data => message.innerHTML = data)
        .catch(err => message.innerHTML = "SPIFFS upload failed");
      }
    </script>
  </body>
</html>
